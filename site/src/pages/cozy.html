<!DOCTYPE html>
<html lang="en">
<my-head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy (McFly)</title>
    <script server:setup>
        const appName = "Cozy"
        console.log('>>> Event (from app)', McFly.event.body)
    </script>
</my-head>
<body>
    <h1>{{ appName }} - {{McFly.hello}}</h1>

        <ul>
            <li>

                Method: {{ McFly.event.method }}
            </li>
        </ul>
    </form>
</body>
</html>
